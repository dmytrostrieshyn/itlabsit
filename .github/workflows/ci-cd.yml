name: CI/CD Pipeline

# Тригери: коли GitHub має запускати цю перевірку
on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  build-and-test:
    name: Build and Test
    runs-on: ubuntu-latest

    steps:
      # Крок 1: Отримання коду з репозиторію
      - name: Checkout repository
        uses: actions/checkout@v4

      # Крок 2: Налаштування середовища Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # Крок 3: Встановлення залежностей
      - name: Install dependencies
        run: npm install

      # Крок 4: Перевірка якості коду (Лінтер)
      - name: Run linter
        run: npm run lint

      # Крок 5: Запуск модульних тестів
      #- name: Run unit tests
      # run: npm run test:unit